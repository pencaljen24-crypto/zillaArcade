<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zilla Arcade</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        background-color: #0a0a0a;
        color: white;
        font-family: 'Inter', sans-serif;
      }
      .font-display { font-family: 'Space Grotesk', sans-serif; }
      .glass-card {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(12px);
        transition: all 0.3s ease;
      }
      .glass-card:hover {
        background: rgba(255, 255, 255, 0.1);
        border-color: rgba(255, 255, 255, 0.2);
        transform: translateY(-4px);
      }
      .game-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 1.5rem;
      }
      iframe { background: black; }
    </style>
  </head>
  <body>
    <div id="app" class="min-h-screen flex flex-col">
      <!-- Header -->
      <header class="sticky top-0 z-40 bg-[#0a0a0a]/80 backdrop-blur-xl border-b border-white/5 px-6 py-4">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row md:items-center justify-between gap-4">
          <div class="flex items-center gap-3 cursor-pointer" onclick="showLibrary()">
            <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/20">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-white"><line x1="6" x2="10" y1="12" y2="12"></line><line x1="8" x2="8" y1="10" y2="14"></line><line x1="15" x2="15" y1="13" y2="13"></line><line x1="18" x2="18" y1="11" y2="11"></line><rect width="20" height="12" x="2" y="6" rx="2"></rect></svg>
            </div>
            <h1 class="text-2xl font-display font-bold tracking-tight">
              ZILLA<span class="text-indigo-500">ARCADE</span>
            </h1>
          </div>

          <div class="relative flex-1 max-w-md">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="absolute left-3 top-1/2 -translate-y-1/2 text-white/40"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path></svg>
            <input
              type="text"
              id="searchInput"
              placeholder="Search for a game..."
              class="w-full bg-white/5 border border-white/10 rounded-xl py-2.5 pl-11 pr-4 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all"
            />
          </div>
        </div>
      </header>

      <main class="flex-1 max-w-7xl mx-auto w-full px-6 py-8">
        <!-- Library View -->
        <div id="libraryView">
          <!-- Recently Played -->
          <div id="recentSection" class="hidden mb-12">
            <div class="flex flex-col gap-2 mb-6">
              <h2 class="text-2xl font-display font-bold tracking-tight text-indigo-400">Recently Played</h2>
              <p class="text-white/40 text-sm">Jump back into your favorite games.</p>
            </div>
            <div id="recentGrid" class="game-grid">
              <!-- Recent games will be injected here -->
            </div>
          </div>

          <div class="flex flex-col gap-2 mb-8">
            <h2 class="text-4xl font-display font-bold tracking-tight">Featured Games</h2>
            <p class="text-white/40">Hand-picked unblocked titles for your entertainment.</p>
          </div>
          <div id="gameGrid" class="game-grid">
            <!-- Games will be injected here -->
          </div>
          <div id="noResults" class="hidden flex flex-col items-center justify-center py-20 text-center gap-4">
            <div class="w-16 h-16 bg-white/5 rounded-full flex items-center justify-center">
              <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-white/20"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path></svg>
            </div>
            <div>
              <h3 class="text-xl font-bold">No games found</h3>
              <p class="text-white/40">Try searching for something else.</p>
            </div>
          </div>
        </div>

        <!-- Player View -->
        <div id="playerView" class="hidden flex flex-col gap-6">
          <div class="flex items-center justify-between">
            <button onclick="showLibrary()" class="flex items-center gap-2 text-white/60 hover:text-white transition-colors group">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="group-hover:-translate-x-1 transition-transform"><path d="m12 19-7-7 7-7"></path><path d="M19 12H5"></path></svg>
              Back to Library
            </button>
            <div class="flex items-center gap-4">
              <button onclick="toggleFullscreen()" class="p-2 bg-white/5 hover:bg-white/10 rounded-lg transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 3 6 6"></path><path d="M9 21 3 15"></path><path d="M21 3v6h-6"></path><path d="M3 21v-6h6"></path></svg>
              </button>
              <button onclick="showLibrary()" class="p-2 bg-white/5 hover:bg-white/10 rounded-lg transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"></path><path d="m6 6 12 12"></path></svg>
              </button>
            </div>
          </div>

          <div id="iframeContainer" class="relative w-full aspect-video overflow-hidden rounded-2xl bg-black shadow-2xl transition-all duration-500">
            <iframe id="gameIframe" class="w-full h-full border-none" allow="fullscreen; autoplay; encrypted-media"></iframe>
          </div>

          <div class="flex flex-col gap-2">
            <h2 id="playerTitle" class="text-3xl font-display font-bold"></h2>
            <p id="playerDescription" class="text-white/60 text-lg max-w-2xl"></p>
          </div>
        </div>
      </main>

      <!-- Footer -->
      <footer class="border-t border-white/5 px-6 py-8 mt-auto">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4 text-white/20 text-sm">
          <p>© 2026 Zilla Arcade. All rights reserved.</p>
          <div class="flex items-center gap-6">
            <a href="#" class="hover:text-white transition-colors">Privacy</a>
            <a href="#" class="hover:text-white transition-colors">Terms</a>
            <a href="#" class="hover:text-white transition-colors">Contact</a>
          </div>
        </div>
      </footer>
    </div>

    <script src="script.js"></script>
  </body>
</html>
